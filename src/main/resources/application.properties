spring.datasource.url=jdbc:postgresql://localhost:5432/campus
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Firebase Admin SDK service account file.
# Examples:
# FIREBASE_SERVICE_ACCOUNT_JSON={...json...}
# FIREBASE_SERVICE_ACCOUNT_JSON_BASE64=eyJ0eXAiOiJKV1Qi...
# firebase.service-account-path=classpath:firebase-service-account.json
# firebase.service-account-path=C:/Users/you/Downloads/serviceAccountKey.json
# Local quick start:
# 1) Copy firebase-service-account.json.example -> firebase-service-account.json
# 2) Paste your real Firebase service account JSON